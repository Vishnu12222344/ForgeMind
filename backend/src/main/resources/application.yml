server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: forgemind-ai

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope:
              - read:user
              - user:email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: ${FLYWAY_ENABLED:false}

app:
  frontend-url: ${APP_FRONTEND_URL}
  mail:
    provider: ${MAIL_PROVIDER:log}

    email-verification:
      otp-expiration-minutes: 10
      max-attempts: 5
  jwt:
    secret: ${APP_JWT_SECRET}
    access-token-expiration-ms: ${APP_JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
    refresh-token-expiration-days: ${APP_JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}

  repository:
    max-upload-size-mb: ${APP_REPOSITORY_MAX_UPLOAD_SIZE_MB:100}
    max-stored-file-size-kb: ${APP_REPOSITORY_MAX_STORED_FILE_SIZE_KB:1024}
    max-uncompressed-size-mb: ${APP_REPOSITORY_MAX_UNCOMPRESSED_SIZE_MB:250}

  ai:
    provider: ${APP_AI_PROVIDER:groq}

    groq:
      api-key: ${GROQ_API_KEY}
      model: ${GROQ_MODEL:llama-3.1-8b-instant}
      base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

  api-docs:
    path: /v3/api-docs



management:
  endpoints:
    web:
      exposure:
        include: health,info