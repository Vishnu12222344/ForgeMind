server:
  port: 8080

spring:
  application:
    name: forgemind-ai

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/forgemind?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: "Reddy@2003PPP"
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false

app:
  frontend-url: http://localhost:5173
  jwt:
    secret: this-is-a-dev-only-secret-key-change-in-production-please-1234567890
    access-token-expiration-ms: 900000
    refresh-token-expiration-days: 7

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info