name: Deploy

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend to Render
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render Deploy Hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Wait for backend health
        run: |
          chmod +x scripts/healthcheck.sh
          ./scripts/healthcheck.sh "${{ secrets.BACKEND_HEALTH_URL }}"

      - name: Notify Discord success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":\"✅ ForgeMind backend deployed successfully\\nCommit: ${{ github.sha }}\\nRepo: ${{ github.repository }}\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Discord failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\":\"❌ ForgeMind backend deployment failed\\nCommit: ${{ github.sha }}\\nRepo: ${{ github.repository }}\"}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}